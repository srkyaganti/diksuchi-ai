# ============================================================
# DIKSUCHI-AI PLATFORM - DOCKER COMPOSE (INFRA ONLY)
# ============================================================
#
# Only infrastructure services run in Docker.
# Application services (web, rag, voice) run natively for
# fast iteration -- see scripts/dev.sh.
#
# Usage:
#   docker-compose up -d          # Start infra
#   docker-compose down           # Stop infra
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: diksuchi-postgres
    environment:
      POSTGRES_DB: diksuchi
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d diksuchi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: diksuchi-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
